<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Peter Carvajal</title>
    <!-- Google Fonts: Playfair Display + Lora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Centralized Links -->
    <script src="links-config.js"></script>

    <style>
        body {
            font-family: 'Lora', Georgia, serif;
            background-color: #faf8f5;
            color: #1a1208;
        }
        h1 {
            font-family: 'Playfair Display', Georgia, serif;
        }

        .link-row {
            border: 1px solid #ddd8d0;
            background-color: #ffffff;
            transition: border-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
        }
        .link-row:hover {
            border-color: #2c5f8a;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(44, 95, 138, 0.08);
        }
        .link-row:hover .chevron {
            color: #2c5f8a;
            transform: translateX(3px);
        }
        .chevron {
            transition: color 0.2s, transform 0.2s;
            color: #c7bfb5;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.55s ease both; }
        .d1 { animation-delay: 0.05s; }
        .d2 { animation-delay: 0.15s; }
        .d3 { animation-delay: 0.25s; }
        .d4 { animation-delay: 0.35s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">

    <div class="max-w-sm w-full">

        <!-- Header -->
        <header class="mb-12 text-center fade-up">
            <div class="w-px h-12 bg-gray-300 mx-auto mb-8"></div>
            <h1 class="text-4xl font-bold mb-3 tracking-tight" style="font-family:'Playfair Display',serif;">
                Peter Carvajal
            </h1>
            <p class="text-sm italic" style="color:#6b6254;">
                Electronic &amp; Telecommunications Engineering
            </p>
            <div class="w-px h-8 bg-gray-300 mx-auto mt-8"></div>
        </header>

        <!-- Links -->
        <nav class="space-y-3">

            <a id="link-linkedin" href="#" target="_blank"
               class="link-row flex items-center justify-between px-5 py-4 group fade-up d1">
                <div class="flex items-center gap-4">
                    <i data-lucide="linkedin" class="w-5 h-5" style="color:#2c5f8a;"></i>
                    <span class="font-medium text-base" style="font-family:'Lora',serif;">LinkedIn</span>
                </div>
                <i data-lucide="chevron-right" class="w-4 h-4 chevron"></i>
            </a>

            <a id="link-github" href="#" target="_blank"
               class="link-row flex items-center justify-between px-5 py-4 group fade-up d2">
                <div class="flex items-center gap-4">
                    <i data-lucide="github" class="w-5 h-5" style="color:#2c5f8a;"></i>
                    <span class="font-medium text-base" style="font-family:'Lora',serif;">GitHub Repository</span>
                </div>
                <i data-lucide="chevron-right" class="w-4 h-4 chevron"></i>
            </a>

            <a id="link-email" href="#"
               class="link-row flex items-center justify-between px-5 py-4 group fade-up d3">
                <div class="flex items-center gap-4">
                    <i data-lucide="mail" class="w-5 h-5" style="color:#2c5f8a;"></i>
                    <span class="font-medium text-base" style="font-family:'Lora',serif;">Professional Email</span>
                </div>
                <i data-lucide="chevron-right" class="w-4 h-4 chevron"></i>
            </a>

            <a id="link-cv" href="#"
               class="link-row flex items-center justify-between px-5 py-4 group fade-up d4">
                <div class="flex items-center gap-4">
                    <i data-lucide="file-text" class="w-5 h-5" style="color:#2c5f8a;"></i>
                    <span class="font-medium text-base" style="font-family:'Lora',serif;">Download CV</span>
                </div>
                <i data-lucide="chevron-right" class="w-4 h-4 chevron"></i>
            </a>

        </nav>

        <!-- Footer -->
        <footer class="mt-16 text-center fade-up d4">
            <div class="w-px h-8 bg-gray-300 mx-auto mb-6"></div>
            <a href="index.html"
               class="inline-flex items-center gap-2 text-sm transition-colors"
               style="color:#6b6254; font-family:'Lora',serif;"
               onmouseover="this.style.color='#1a1208'" onmouseout="this.style.color='#6b6254'">
                <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to Portfolio
            </a>
        </footer>

    </div>

    <script>
        lucide.createIcons();

        // ── Inject links from centralized config ──
        document.getElementById('link-linkedin').href = LINKS.linkedin;
        document.getElementById('link-github').href   = LINKS.github;
        document.getElementById('link-email').href    = LINKS.email;
        document.getElementById('link-cv').href       = LINKS.cv;
    </script>
</body>
</html>
